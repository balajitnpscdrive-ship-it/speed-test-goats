<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DB G.O.A.T.S | SPEED MODE</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --neon: #fbff00; --accent: #00d4ff; --bg: #000; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: cover; background-position: center; filter: brightness(0.3) blur(5px); }
    .header { padding: calc(20px + env(safe-area-inset-top)) 20px 20px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    .logo-row { display: flex; gap: 15px; align-items: center; }
    .logo-img { height: 45px; } .founder-img { height: 55px; width: 55px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
    #dept-gate { padding: 20px; max-width: 900px; margin: auto; }
    .gate-title { text-align: center; font-weight: 900; color: var(--neon); margin-bottom: 25px; }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding-bottom: env(safe-area-inset-bottom); }
    .dept-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px 15px; text-align: center; cursor: pointer; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .dept-card:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }
    .dept-card b { font-size: 18px; font-weight: 900; text-transform: uppercase; }
    #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal-box { background: #111; border: 1px solid var(--neon); border-radius: 20px; padding: 30px; width: 100%; max-width: 350px; text-align: center; }
    input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 12px; font-size: 16px; }
    .btn-main { width: 100%; padding: 15px; border-radius: 12px; background: var(--neon); color: black; font-weight: 900; border: none; font-size: 16px; margin-top: 10px; }
    #teacher-view { display: none; padding: 20px; max-width: 600px; margin: auto; }
    .glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
    .score-row { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; margin-bottom: 20px; }
    .score-card { flex: 0 0 100px; background: #111; padding: 12px; border-radius: 15px; text-align: center; border-top: 4px solid #888; font-size: 11px; }
    .house-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .house-btn { padding: 35px 10px; border-radius: 15px; border: none; font-weight: 900; font-size: 16px; color: black; }
    .type-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .type-btn { flex: 1; padding: 15px; border-radius: 12px; font-weight: 900; border: 3px solid transparent; }
    #reader { width: 100%; border-radius: 15px; overflow:hidden; display: none; margin: 10px 0; border: 2px solid var(--neon); }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--neon); color: black; padding: 15px 30px; border-radius: 50px; display: none; z-index: 5000; font-weight: 900; }
    .admin-branding { display: none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 20px; }
    .upload-box { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
    .btn-upload { background: #222; border: 1px solid #444; color: white; padding: 10px; width: 100%; border-radius: 10px; text-align: center; }
  </style>
</head>
<body onload="boot()">
  <div class="bg-overlay" id="main-bg"></div>
  <div id="toast"></div>
  <div class="header">
    <div class="logo-row"><img id="m-logo" class="logo-img"><img id="m-founder" class="founder-img"></div>
    <div style="margin-top:10px;"><b style="font-size:14px;">DON BOSCO POLYTECHNIC COLLEGE</b><br><span style="font-size:10px; color:var(--neon)">G.O.A.T.S CORE PORTAL</span></div>
  </div>
  <div id="dept-gate">
    <h1 class="gate-title">SELECT DEPARTMENT</h1>
    <div id="dept-grid" class="dept-grid"></div>
  </div>
  <div id="login-modal" onclick="if(event.target==this) closeLogin()">
    <div class="modal-box">
      <h3 id="target-dept" style="color:var(--accent);"></h3>
      <input type="password" id="pass-input" placeholder="Password">
      <button class="btn-main" onclick="handleLogin()">ENTER</button>
    </div>
  </div>
  <div id="teacher-view">
    <div class="glass">
      <div style="text-align:center; color:var(--accent); font-weight:900; margin-bottom:15px;" id="active-dept">---</div>
      <div id="score-row" class="score-row"></div>
      <div class="type-row">
        <button class="type-btn" id="btn-neg" onclick="setMode('Negative')" style="background:#ff416c; color:white;">-5</button>
        <button class="type-btn" id="btn-pos" onclick="setMode('Positive')" style="background:#00b09b; color:white;">+10</button>
      </div>
      <div id="house-grid" class="house-grid"></div>
      <button onclick="toggleCam()" style="background:var(--neon); border:none; padding:18px; border-radius:50px; font-weight:900; width:100%; margin-bottom:15px;">📷 SCAN STUDENT QR</button>
      <div id="reader"></div>
      <input type="text" id="man-name" placeholder="Manual Name">
      <select id="man-house"><option selected disabled>Select House</option></select>
      <button onclick="submitManual()" style="width:100%; background:#222; color:white; border:none; padding:12px; border-radius:12px; margin-bottom:20px;">SUBMIT MANUAL</button>
      <input type="text" id="t-name" placeholder="Teacher Name">
      <select id="p-cat"></select>
      <div id="admin-actions" style="display:none; margin-top:20px;">
        <button class="btn-main" style="background:#222; color:var(--accent); border:1px solid var(--accent); font-size:14px;" onclick="toggleBranding()">🎨 BRANDING DASHBOARD</button>
      </div>
      <div id="admin-branding" class="admin-branding">
        <div class="upload-box"><label style="font-size:10px; display:block; margin-bottom:5px;">LOGO</label><input type="file" onchange="handleFile(this, 'Logo_ID')" accept="image/*"></div>
        <div class="upload-box"><label style="font-size:10px; display:block; margin-bottom:5px;">FOUNDER</label><input type="file" onchange="handleFile(this, 'Founder_ID')" accept="image/*"></div>
        <div class="upload-box"><label style="font-size:10px; display:block; margin-bottom:5px;">BG</label><input type="file" onchange="handleFile(this, 'Background_ID')" accept="image/*"></div>
      </div>
      <button class="btn-main" style="background:transparent; border:1px solid #444; color:white; margin-top:15px;" onclick="logout()">LOGOUT</button>
    </div>
  </div>
  <script>
    const API = "https://script.google.com/macros/s/AKfycbz_rChVCM8UQGo5LOYVYQOYqIwoOAzGi_40IfFVGLXfoxrjOnvRpPcJpczH5nIxKQ21fw/exec";
    let scores = {}, currentMode = "Positive", currentDept = "", selectedDept = "", scanActive = false, html5QrCode = null;
    async function boot() {
      const cache = localStorage.getItem('goats_cache');
      if (cache) try { render(JSON.parse(cache)); } catch(e){}
      const res = await fetch(API, { method: "POST", body: JSON.stringify({action: "getAppData"}) }).then(r => r.json());
      if (res && res.deptList) { localStorage.setItem('goats_cache', JSON.stringify(res)); render(res); }
    }
    function render(data) {
      if (!data) return;
      const { images, houseConfig, deptList, categories } = data;
      if(images.bg) document.getElementById('main-bg').style.backgroundImage = `url('${images.bg}')`;
      document.getElementById('m-logo').src = images.logo; document.getElementById('m-founder').src = images.founder;
      document.getElementById('dept-grid').innerHTML = deptList.map(d => `<div class="dept-card" onclick="openLogin('${d}')"><b>${d}</b></div>`).join('');
      if (categories) document.getElementById('p-cat').innerHTML = categories.map(c => `<option>${c}</option>`).join('');
      if(houseConfig) {
        const row = document.getElementById('score-row'), grid = document.getElementById('house-grid'), sel = document.getElementById('man-house');
        row.innerHTML = ""; grid.innerHTML = ""; sel.innerHTML = '<option selected disabled>Select House</option>';
        houseConfig.forEach(h => {
          scores[h.name] = 0;
          row.innerHTML += `<div class="score-card" style="border-top-color:${h.color}">${h.name}<br><b id="s-${h.name}">0</b></div>`;
          grid.innerHTML += `<button class="house-btn" style="background:${h.color}" onclick="record('${h.name}', 'WINNER')">${h.name}</button>`;
          sel.add(new Option(h.name, h.name));
        });
      }
      setMode('Positive');
    }
    function openLogin(d) { selectedDept = d; document.getElementById('target-dept').innerText = d; document.getElementById('login-modal').style.display = 'flex'; }
    function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }
    function logout() { document.getElementById('teacher-view').style.display = 'none'; document.getElementById('dept-gate').style.display = 'block'; currentDept = ""; }
    async function handleLogin() {
      const p = document.getElementById('pass-input').value; if(!p) return;
      const res = await fetch(API, { method: "POST", body: JSON.stringify({action: "authenticate", user: selectedDept, pass: p}) }).then(r => r.json());
      if(res.success) {
        closeLogin(); document.getElementById('dept-gate').style.display = 'none'; document.getElementById('teacher-view').style.display = 'block';
        currentDept = selectedDept; document.getElementById('active-dept').innerText = selectedDept;
        document.getElementById('admin-actions').style.display = res.role === 'Admin' ? 'block' : 'none';
      } else alert("Wrong Password");
    }
    async function record(hInput, sName, sDept = null) {
      const t = document.getElementById('t-name').value; if(!t) { alert("Enter Teacher Name first!"); if(scanActive) stopCam(); return; }
      const actualH = Object.keys(scores).find(k => k.toLowerCase() === hInput.trim().toLowerCase());
      if(actualH) {
        const pts = currentMode === 'Positive' ? 10 : -5;
        scores[actualH] += pts; document.getElementById('s-'+actualH).innerText = scores[actualH];
        showToast(`${sName} (${pts})`); if(pts > 0) confetti({ particleCount: 50 });
        fetch(API, { method: "POST", body: JSON.stringify({ action: "submitPoint", data: { dept: currentDept, studentDept: sDept, studentName: sName, teacherName: t, category: document.getElementById('p-cat').value, house: actualH, type: currentMode } })});
      } else showToast("Unknown House: " + hInput);
    }
    async function toggleCam() {
      if(!scanActive) {
        document.getElementById('reader').style.display = 'block'; html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (t) => {
          const p = t.split('|').map(x => x.trim()); if(p.length >= 3) { record(p[2], p[0], p[1]); stopCam(); }
        });
        scanActive = true;
      } else stopCam();
    }
    async function stopCam() { if(html5QrCode) await html5QrCode.stop(); document.getElementById('reader').style.display = 'none'; scanActive = false; }
    function submitManual() {
      const n = document.getElementById('man-name').value, h = document.getElementById('man-house').value;
      if(!n || !h) return alert("Missing Info"); record(h, n);
    }
    function toggleBranding() { const b = document.getElementById('admin-branding'); b.style.display = b.style.display==='block'?'none':'block'; }
    function handleFile(input, key) {
      if(!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        showToast("UPLOADING...");
        const res = await fetch(API, { method: "POST", body: JSON.stringify({ action: "uploadBranding", data: { key, name: input.files[0].name, file: e.target.result } }) }).then(r => r.json());
        if(res.success) { showToast("SUCCESS!"); setTimeout(()=>location.reload(), 1000); }
      };
      reader.readAsDataURL(input.files[0]);
    }
    function setMode(m) { currentMode = m; document.getElementById('btn-pos').style.borderColor = m==='Positive'?'var(--neon)':'transparent'; document.getElementById('btn-neg').style.borderColor = m==='Negative'?'var(--neon)':'transparent'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2500); }
  </script>
</body>
</html>
