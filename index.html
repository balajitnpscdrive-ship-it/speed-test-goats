  <script>
    const API = "https://script.google.com/macros/s/AKfycbwr1IHyEyyopH3WMONurkRWmgtpQsKsnyvNbnT_mc814XvZsooaPQQjD7NiTBoCkd7tMw/exec";
    let scores={}, houseColors={}, currentMode="Positive", currentDept="", selectedDept="", scanActive=false, html5QrCode=null, isAdmin=false, adminCats=[], lbDept="", lbCat="ALL";
    
    // -- WORLD CLASS AUDIO SFX --
    const sfxSuccess = new Audio("https://upload.wikimedia.org/wikipedia/commons/e/ec/Notif1.wav");
    const sfxFail = new Audio("https://upload.wikimedia.org/wikipedia/commons/3/30/Buzzer.ogg");

    function api(payload) {
      return fetch(API, { method:"POST", body:JSON.stringify(payload) }).then(r=>r.json());
    }

    async function boot() {
      const st = document.getElementById('sync-status');
      st.innerText = "⌛";
      const cache = localStorage.getItem('goats_cache');
      if(cache) try { render(JSON.parse(cache)); } catch(e){}
      
      try {
        const res = await api({action:"getAppData"});
        if(res && res.deptList) {
          localStorage.setItem('goats_cache', JSON.stringify(res));
          render(res);
          st.innerText = "🟢 LIVE"; st.className = "status-live";
          
          // FAST AUTO-LOGIN
          const savedUser = localStorage.getItem('goats_user');
          const savedPass = localStorage.getItem('goats_pass');
          if (savedUser && savedPass) {
             selectedDept = savedUser;
             document.getElementById('pass-input').value = savedPass;
             handleLogin(true);
          }
          
          // PROCESS OFFLINE QUEUE UPON RECONNECT
          processQueue();

        } else throw new Error(res.error||"empty");
      } catch(e) {
        st.innerText = "🔴 OFFLINE"; st.className = "status-offline";
      }
    }

    const deptIcons = {'cse':'💻','it':'🖥️','ece':'📡','eee':'⚡','mech':'⚙️','civil':'🏗️','auto':'🚗','chem':'🧪','arch':'🏛️','admin':'👑','mca':'🖱️','bca':'📱','arts':'🎨','science':'🔬','commerce':'📊'};
    function getIcon(d){const k=d.toLowerCase().replace(/\s+/g,'');for(const key in deptIcons){if(k.includes(key))return deptIcons[key];}return '📚';}
    
    function render(data){
      if(!data) return;
      const {images,houseConfig,deptList,categories}=data;
      adminCats=categories||[];
      if(images&&images.bg) document.getElementById('main-bg').style.backgroundImage=`url('${images.bg}')`;
      if(images&&images.logo) document.getElementById('m-logo').src=images.logo;
      if(images&&images.founder) document.getElementById('m-founder').src=images.founder;
      document.getElementById('dept-grid').innerHTML=deptList.map(d=>`
        <div class="dept-card" onclick="handleCard('${d}')">
          <div style="font-size:30px;margin-bottom:6px;">${getIcon(d)}</div>
          <b>${d}</b><div class="dept-card-bar"></div>
        </div>`).join('');
      if(categories) document.getElementById('p-cat').innerHTML=categories.map(c=>`<option>${c}</option>`).join('');
      if(houseConfig){
        const strip=document.getElementById('score-strip'),grid=document.getElementById('house-grid'),sel=document.getElementById('man-house');
        strip.innerHTML="";grid.innerHTML="";sel.innerHTML='<option selected disabled>House</option>';
        houseConfig.forEach((h,i)=>{
          scores[h.name]=0;houseColors[h.name]=h.color;
          strip.innerHTML+=`<div class="score-chip" id="chip-${h.name}" style="border-top-color:${h.color};--chip-color:${h.color}"><div class="chip-rank" id="rank-${h.name}"></div><div class="chip-name">${h.name}</div><div class="chip-score" id="s-${h.name}">0</div></div>`;
          grid.innerHTML+=`<button class="house-btn" style="background:${h.color};--glow:${h.color};animation:pulseGlow ${2+i*.3}s ease-in-out infinite" onclick="record('${h.name}','WINNER')">${h.name}</button>`;
          sel.add(new Option(h.name,h.name));
        });
      }
      setMode('Positive');
    }

    function updateRanks(){
      const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
      const medals=['🥇','🥈','🥉'];
      sorted.forEach(([name],i)=>{
        document.getElementById('rank-'+name).innerText=medals[i]||'';
        document.getElementById('chip-'+name).classList.toggle('leader',i===0);
      });
    }

    function handleCard(d){ isAdmin ? openLb(d) : openLogin(d); }
    
    function openLogin(d){
      selectedDept=d;
      document.getElementById('target-dept').innerText=d;
      document.getElementById('pass-input').value='';
      document.getElementById('login-modal').style.display='flex';
      setTimeout(()=>document.getElementById('pass-input').focus(), 50);
    }
    
    function closeLogin(){document.getElementById('login-modal').style.display='none';}
    
    async function handleLogin(isSilent = false){
      const p = document.getElementById('pass-input').value; if(!p) return;
      try {
        const res=await api({action:"authenticate",user:selectedDept,pass:p});
        if(res.success){
          closeLogin();
          localStorage.setItem('goats_user', selectedDept);
          localStorage.setItem('goats_pass', p);
          
          isAdmin = res.role==='Admin';
          currentDept=selectedDept;
          document.getElementById('dept-label').innerText=selectedDept;
          document.getElementById('dept-gate').style.display = isAdmin ? 'block' : 'none';
          document.getElementById('teacher-view').style.display='block';
          document.getElementById('admin-actions').style.display=isAdmin?'flex':'none';
          ['house-grid','cam-area','manual-area','type-select','teacher-meta'].forEach(id=>{
            const el=document.getElementById(id);if(el) el.style.display=isAdmin?'none':'';
          });
          
          if(!isAdmin){
            document.getElementById('type-select').style.display='flex';
            document.getElementById('house-grid').style.display='grid';
          } else {
            document.querySelector('.gate-title').innerText = "📊 ADMIN DASHBOARD - SELECT LEADERBOARD";
            const grid = document.getElementById('dept-grid');
            if (!document.getElementById('card-all')) {
              grid.innerHTML = `<div id="card-all" class="dept-card" style="border-color:var(--neon);" onclick="openLb('ALL')">
                <div style="font-size:30px;margin-bottom:6px;">👑</div>
                <b style="color:var(--neon)">OVERALL SCHOOL</b><div class="dept-card-bar" style="background:var(--neon)"></div>
              </div>` + grid.innerHTML;
            }
            document.getElementById('teacher-view').style.paddingBottom = "10px";
            window.scrollTo(0, 0);
          }
        } else {
          localStorage.removeItem('goats_user');
          localStorage.removeItem('goats_pass');
          if(!isSilent) showToast("❌ Wrong Password");
        }
      } catch(e) {
        if(!isSilent) showToast("❌ Login Error!");
      }
    }

    // ── OFFLINE QUEUE MANAGER ──
    async function processQueue() {
      const q = JSON.parse(localStorage.getItem('goats_queue') || '[]');
      if(q.length === 0) return;
      showToast("📡 Syncing " + q.length + " offline points...");
      let failed = [];
      for(const item of q) {
         try {
           const r = await api({action:"submitPoint", data:item});
           if(!r || !r.success) throw new Error();
         } catch(e) { failed.push(item); }
      }
      localStorage.setItem('goats_queue', JSON.stringify(failed));
      if(failed.length === 0) {
         showToast("✅ All offline points synced!");
      } else {
         showToast("⚠️ Some offline points still pending.");
      }
    }

    async function record(hInput,sName,sDept=null){
      const t=document.getElementById('t-name').value;
      if(!t){showToast("⚠️ Enter Teacher Name first!");if(scanActive)stopCam();return;}
      const actualH=Object.keys(scores).find(k=>k.toLowerCase()===hInput.trim().toLowerCase());
      if(!actualH) return;
      const pts=currentMode==='Positive'?10:-5;
      
      // Update UI Immediately
      scores[actualH]+=pts;
      document.getElementById('s-'+actualH).innerText=scores[actualH];
      updateRanks();
      
      // HAPTICS & AUDIO FEEDBACK
      if(navigator.vibrate) navigator.vibrate(pts>0 ? [60,60,60] : [250]); // 3 light bursts, or 1 angry buzz
      if(pts>0) {
        confetti({particleCount:60,spread:70,origin:{y:0.6}});
        try{ sfxSuccess.currentTime=0; sfxSuccess.play().catch(()=>{}); }catch(e){}
      } else {
        popEmoji('😢');
        try{ sfxFail.currentTime=0; sfxFail.play().catch(()=>{}); }catch(e){}
      }

      const payload = {dept:currentDept,studentDept:sDept,studentName:sName,teacherName:t,category:document.getElementById('p-cat').value,house:actualH,type:currentMode};
      
      try{
        if(!navigator.onLine) throw new Error("Offline"); // Force catch if no internet
        const res=await api({action:"submitPoint",data:payload});
        if(!res||!res.success) throw new Error(res.error||"No success response from server.");
        showToast("✅ Point Saved: " + sName);
      }catch(e){
        // HALLWAY MODE (Offline Queueing)
        const q = JSON.parse(localStorage.getItem('goats_queue') || '[]');
        q.push(payload);
        localStorage.setItem('goats_queue', JSON.stringify(q));
        showToast("📡 Offline Mode! Point queued for " + sName);
      }
    }
    
    function popEmoji(e){const el=document.createElement('div');el.className='emoji-pop';el.innerText=e;document.body.appendChild(el);setTimeout(()=>el.remove(),900);}
    
    async function toggleCam(){
      const btn=document.getElementById('cam-btn'),hint=document.getElementById('scan-hint');
      if(!scanActive){
        document.getElementById('reader').style.display='block';
        btn.classList.add('scanning');btn.innerText='⏹';hint.innerText='SCANNING...';
        html5QrCode=new Html5Qrcode("reader");
        await html5QrCode.start({facingMode:"environment"},{fps:15,qrbox:240},(t)=>{
          const p=t.split('|').map(x=>x.trim());
          if(p.length>=3){record(p[2],p[0],p[1]);stopCam();}
        });scanActive=true;
      } else stopCam();
    }
    
    async function stopCam(){
      if(html5QrCode) await html5QrCode.stop();
      document.getElementById('reader').style.display='none';
      const btn=document.getElementById('cam-btn'),hint=document.getElementById('scan-hint');
      btn.classList.remove('scanning');btn.innerText='📷';hint.innerText='TAP TO SCAN QR';scanActive=false;
    }
    
    function submitManual(){const n=document.getElementById('man-name').value,h=document.getElementById('man-house').value;if(!n||!h){showToast("⚠️ Fill name & house");return;}record(h,n);document.getElementById('man-name').value="";}
    function setMode(m){currentMode=m;document.getElementById('btn-pos').className='mode-btn'+(m==='Positive'?' active-pos':'');document.getElementById('btn-neg').className='mode-btn'+(m==='Negative'?' active-neg':'');}
    
    function logout(){
      localStorage.removeItem('goats_user');
      localStorage.removeItem('goats_pass');
      document.getElementById('teacher-view').style.display='none';
      document.getElementById('dept-gate').style.display='block';
      document.querySelector('.gate-title').innerText = "SELECT DEPARTMENT";
      const allCard = document.getElementById('card-all');
      if(allCard) allCard.remove();
      isAdmin=false; currentDept=""; if(scanActive)stopCam();
    }
    
    function toggleBranding(){const b=document.getElementById('admin-branding');b.style.display=b.style.display==='block'?'none':'block';}
    
    async function forceSync(){
      showToast("🔄 Syncing queues...");
      await processQueue();
      localStorage.removeItem('goats_cache');
      await boot();
    }
    
    // ── ADMIN LEADERBOARD ──
    function openLb(dept){
      lbDept=dept; lbCat='ALL';
      document.getElementById('lb-title').innerText=dept.toUpperCase()+' — WEEKLY';
      const cats=['ALL',...adminCats];
      document.getElementById('lb-cat-filters').innerHTML=cats.map(c=>`<button class="lb-filter-btn${c==='ALL'?' active':''}" onclick="setLbCat('${c}')">${c}</button>`).join('');
      document.getElementById('lb-modal').style.display='flex';
      loadLb();
    }
    function closeLb(){document.getElementById('lb-modal').style.display='none';}
    function setLbCat(cat){lbCat=cat;document.querySelectorAll('.lb-filter-btn').forEach(b=>b.classList.toggle('active',b.innerText===cat));loadLb();}
    
    async function loadLb(){
      const body=document.getElementById('lb-body');
      body.innerHTML='<div class="lb-empty">⌛ Loading...</div>';
      try{
        const res=await api({action:"getDeptLeaderboard",dept:lbDept,category:lbCat});
        if(!res.success||!res.leaderboard.length){body.innerHTML='<div class="lb-empty">No data this week yet.</div>';return;}
        const lb=res.leaderboard, max=lb[0].pts||1, medals=['🥇','🥈','🥉'];
        let pod='<div class="lb-podium">';
        const order=lb.length>=3?[1,0,2]:lb.map((_,i)=>i);
        order.filter(i=>lb[i]).forEach(i=>{
          const h=lb[i],col=houseColors[h.name]||'#888',ht=Math.max(60,Math.round((h.pts/max)*140));
          pod+=`<div class="lb-podium-item"><div class="lb-podium-bar" style="background:${col};height:${ht}px">${medals[i]||''}</div><div class="lb-podium-name">${h.name}</div><div class="lb-podium-score">${h.pts}</div></div>`;
        });
        pod+='</div>';
        const rows=lb.map((h,i)=>{
          const col=houseColors[h.name]||'#888',pct=Math.round((h.pts/max)*100);
          return `<div class="lb-row" style="border-left-color:${col}"><div class="lb-row-rank">${medals[i]||i+1}</div><div style="flex:1"><div class="lb-row-name">${h.name}</div><div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${pct}%;background:${col}"></div></div></div><div class="lb-row-pts">${h.pts}</div></div>`;
        }).join('');
        body.innerHTML=`<div style="font-size:10px;color:rgba(255,255,255,.3);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">📅 LAST 7 DAYS · ${lbCat==='ALL'?'All Categories':lbCat}</div>${pod}${rows}`;
      }catch(e){body.innerHTML='<div class="lb-empty">Failed to load.</div>';}
    }
    
    // ── BULK QR ──
    async function prepareBulkPrint(){
      showToast("Loading students...");
      const res=await api({action:"getStudentList"});
      const pw=window.open('','_blank');
      pw.document.write(`<!DOCTYPE html><html><head><title>Batch QR</title>
        <style>body{font-family:sans-serif;margin:0;padding:20px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.box{border:1px solid #ddd;padding:10px;text-align:center;page-break-inside:avoid;border-radius:8px}.qr{width:110px;height:110px;margin:5px auto;background:#fff}.lbl{font-size:9px;font-weight:900;text-transform:uppercase;line-height:1.4;margin-top:5px;color:#000}.btn{position:fixed;top:10px;right:10px;padding:12px 24px;background:#000;color:#fbff00;border:none;border-radius:8px;font-weight:900;cursor:pointer}@media print{.btn{display:none}@page{size:A4;margin:1cm}}</style>
      </head><body>
        <button class="btn" onclick="window.print()">PRINT A4 SHEET</button>
        <div class="grid" id="g"></div>
        <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
        <script>function gen(){const ss=${JSON.stringify(res.students)},g=document.getElementById('g');if(typeof QRCode==='undefined'){setTimeout(gen,100);return;}ss.forEach(s=>{const b=document.createElement('div');b.className='box';const q=document.createElement('div');q.className='qr';const l=document.createElement('div');l.className='lbl';l.innerHTML=(s.name||'')+'<br>'+(s.dept||'')+' | '+(s.house||'');b.appendChild(q);b.appendChild(l);g.appendChild(b);try{new QRCode(q,{text:(s.name||'')+' | '+(s.dept||'')+' | '+(s.house||''),width:110,height:110});}catch(e){}});}gen();<\/script>
      </body></html>`);
      pw.document.close();
    }
    
    // ── BRANDING UPLOAD ──
    function handleFile(input,key){
      if(!input.files[0]) return;
      const rd=new FileReader();
      rd.onload=async(e)=>{
        showToast("Uploading...");
        const res=await api({action:"uploadBranding",data:{key,name:input.files[0].name,file:e.target.result}});
        if(res.success){localStorage.removeItem('goats_cache');showToast("✅ Updated!");setTimeout(()=>location.reload(),1000);}
        else showToast("❌ Upload Failed");
      };
      rd.readAsDataURL(input.files[0]);
    }
    
    function showToast(msg){const t=document.getElementById('toast');t.innerText=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3200);}
  </script>
