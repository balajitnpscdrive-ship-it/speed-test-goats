<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DB G.O.A.T.S | CHAMPIONSHIP PORTAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --neon: #fbff00; --accent: #00d4ff; --green: #00ff88; --red: #ff416c; --bg: #050508; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
    /* ── BG ── */
    .bg-overlay { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; filter: brightness(0.2) blur(8px); transition: background-image 1s ease; }
    /* ── HEADER ── */
    .header { padding: calc(12px + env(safe-area-inset-top)) 20px 12px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; }
    .header-logos { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-img { height: 40px; object-fit: contain; }
    .founder-img { height: 48px; width: 48px; border-radius: 50%; border: 2px solid var(--neon); object-fit: cover; }
    .header-title { flex: 1; }
    .header-title h1 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--neon); line-height: 1; }
    .header-title p { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
    #sync-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
    .status-live { color: var(--green) !important; border-color: var(--green) !important; }
    .status-offline { color: var(--red) !important; border-color: var(--red) !important; }
    /* ── DEPT GATE ── */
    #dept-gate { padding: 20px; max-width: 900px; margin: auto; }
    .gate-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: rgba(255,255,255,0.15); text-align: center; margin-bottom: 20px; }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
    .dept-card { background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 22px 12px; text-align: center; cursor: pointer; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s; position: relative; overflow: hidden; }
    .dept-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(251,255,0,0.06), transparent); opacity: 0; transition: opacity 0.2s; }
    .dept-card:active { transform: scale(0.93); box-shadow: 0 0 20px rgba(251,255,0,0.15); }
    .dept-card:active::before { opacity: 1; }
    .dept-card b { display: block; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    .dept-card-bar { height: 3px; background: linear-gradient(90deg, var(--neon), var(--accent)); border-radius: 3px; margin-top: 10px; opacity: 0.5; }
    /* ── LOGIN MODAL ── */
    #login-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-box { background: rgba(20,20,25,0.9); border: 1px solid rgba(251,255,0,0.3); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; animation: slideUp 0.3s ease; box-shadow: 0 0 60px rgba(251,255,0,0.08); }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--neon); letter-spacing: 3px; margin-bottom: 20px; }
    input, select { width: 100%; padding: 14px 16px; margin: 8px 0; background: rgba(255,255,255,0.04); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 16px; font-family: inherit; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: var(--neon); outline: none; background: rgba(251,255,0,0.04); }
    select option { background: #111; }
    .btn-main { width: 100%; padding: 15px; border-radius: 12px; background: var(--neon); color: black; font-weight: 900; border: none; cursor: pointer; font-size: 15px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 18px; transition: transform 0.1s; }
    .btn-main:active { transform: scale(0.97); }
    /* ── TEACHER VIEW ── */
    #teacher-view { display: none; max-width: 600px; margin: auto; padding-bottom: 40px; }
    /* ── LIVE SCOREBOARD ── */
    .scoreboard { padding: 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sb-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 10px; text-align: center; }
    .score-strip { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; }
    .score-chip { flex: 0 0 auto; min-width: 80px; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 10px 14px; text-align: center; border-top: 3px solid #333; position: relative; transition: box-shadow 0.3s; }
    .score-chip.leader { box-shadow: 0 0 20px var(--chip-color, #888); }
    .score-chip .chip-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); }
    .score-chip .chip-score { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1.1; color: white; }
    .score-chip .chip-rank { font-size: 14px; position: absolute; top: -8px; right: -4px; }
    /* ── TEACHER PANEL ── */
    .t-panel { margin: 16px; background: rgba(10,10,18,0.8); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 16px; }
    /* ── MODE TOGGLE ── */
    .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 4px; }
    .mode-btn { flex: 1; padding: 12px; border-radius: 11px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: all 0.2s; background: transparent; color: rgba(255,255,255,0.3); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 18px; }
    .mode-btn.active-pos { background: linear-gradient(135deg, #00b09b, #00ff88); color: black; box-shadow: 0 4px 20px rgba(0,255,136,0.3); }
    .mode-btn.active-neg { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; box-shadow: 0 4px 20px rgba(255,65,108,0.3); }
    /* ── HOUSE BUTTONS ── */
    .house-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .house-btn { padding: 28px 10px; border-radius: 16px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: black; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .house-btn::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.15); opacity: 0; transition: opacity 0.15s; }
    .house-btn:active { transform: scale(0.92); }
    .house-btn:active::after { opacity: 1; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 12px var(--glow); } 50% { box-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow); } }
    /* ── SCAN BUTTON ── */
    .scan-area { text-align: center; margin-bottom: 14px; }
    #cam-btn { background: linear-gradient(135deg, var(--neon), #e8ff00); border: none; padding: 0; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; position: relative; transition: transform 0.15s; box-shadow: 0 0 0 0 rgba(251,255,0,0.4); }
    #cam-btn.scanning { animation: scanPulse 1.2s infinite; }
    @keyframes scanPulse { 0% { box-shadow: 0 0 0 0 rgba(251,255,0,0.5); } 70% { box-shadow: 0 0 0 20px rgba(251,255,0,0); } 100% { box-shadow: 0 0 0 0 rgba(251,255,0,0); } }
    #cam-btn:active { transform: scale(0.92); }
    .scan-hint { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; }
    #reader { border-radius: 16px; overflow: hidden; border: 2px solid var(--neon); display: none; margin-bottom: 14px; box-shadow: 0 0 30px rgba(251,255,0,0.15); }
    /* ── MANUAL ── */
    .manual-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .manual-row input, .manual-row select { margin: 0; flex: 1; }
    .btn-sub { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-bottom: 14px; letter-spacing: 1px; }
    /* ── META ── */
    .meta-row { display: flex; gap: 8px; }
    .meta-row input, .meta-row select { margin: 0; flex: 1; }
    /* ── ADMIN ── */
    .admin-section { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
    .btn-admin { padding: 14px; border-radius: 12px; background: transparent; font-weight: 900; cursor: pointer; font-size: 13px; letter-spacing: 1px; font-family: inherit; }
    .admin-branding { display: none; margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 16px; }
    .upload-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); padding: 12px 14px; border-radius: 12px; margin-bottom: 8px; }
    .upload-box label { font-size: 10px; color: var(--accent); display: block; margin-bottom: 6px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
    /* ── LOGOUT ── */
    .btn-logout { width: calc(100% - 32px); margin: 16px; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: rgba(255,255,255,0.4); font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 1px; }
    /* ── EMOJI / TOAST ── */
    .emoji-pop { position: fixed; top: 50%; left: 50%; font-size: 160px; z-index: 9999; pointer-events: none; animation: popScale 0.9s ease-out forwards; }
    @keyframes popScale { 0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; } 25% { transform: translate(-50%,-50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%,-90%) scale(1.3); opacity: 0; } }
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 24px; border-radius: 50px; display: none; z-index: 5000; font-weight: 600; font-size: 13px; backdrop-filter: blur(10px); }
  </style>
</head>
<body onload="boot()">
  <div class="bg-overlay" id="main-bg"></div>
  <div id="toast"></div>
  <!-- HEADER -->
  <div class="header">
    <div class="header-logos">
      <img id="m-logo" class="logo-img">
      <img id="m-founder" class="founder-img">
    </div>
    <div class="header-title">
      <h1>G.O.A.T.S</h1>
      <p>Championship Portal</p>
    </div>
    <div id="sync-status">OFFLINE</div>
  </div>
  <!-- DEPT GATE -->
  <div id="dept-gate">
    <p class="gate-title">SELECT DEPARTMENT</p>
    <div id="dept-grid" class="dept-grid"></div>
  </div>
  <!-- LOGIN MODAL -->
  <div id="login-modal" onclick="if(event.target==this) closeLogin()">
    <div class="modal-box">
      <h2 id="target-dept">DEPARTMENT</h2>
      <input type="password" id="pass-input" placeholder="Enter Password" onkeydown="if(event.key==='Enter') handleLogin()">
      <button class="btn-main" onclick="handleLogin()">ENTER PORTAL</button>
    </div>
  </div>
  <!-- TEACHER VIEW -->
  <div id="teacher-view">
    <!-- LIVE SCOREBOARD -->
    <div class="scoreboard">
      <div class="sb-label">🏆 LIVE HOUSE SCORES</div>
      <div id="score-strip" class="score-strip"></div>
    </div>
    <!-- MAIN PANEL -->
    <div class="t-panel">
      <div id="dept-label" style="font-size:11px; color:var(--accent); font-weight:900; letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; text-align:center;"></div>
      <!-- MODE TOGGLE -->
      <div class="mode-toggle" id="type-select">
        <button class="mode-btn active-pos" id="btn-pos" onclick="setMode('Positive')">＋10 POSITIVE</button>
        <button class="mode-btn" id="btn-neg" onclick="setMode('Negative')">－5 NEGATIVE</button>
      </div>
      <!-- HOUSE GRID -->
      <div id="house-grid" class="house-grid"></div>
      <!-- SCAN BUTTON -->
      <div class="scan-area" id="cam-area">
        <button id="cam-btn" onclick="toggleCam()">📷</button>
        <div class="scan-hint" id="scan-hint">TAP TO SCAN QR</div>
      </div>
      <div id="reader"></div>
      <!-- MANUAL ENTRY -->
      <div id="manual-area">
        <div class="manual-row">
          <input type="text" id="man-name" placeholder="Student Name">
          <select id="man-house"><option selected disabled>House</option></select>
        </div>
        <button class="btn-sub" onclick="submitManual()">✓ SUBMIT MANUALLY</button>
      </div>
      <!-- TEACHER / CATEGORY META -->
      <div class="meta-row" id="teacher-meta">
        <input type="text" id="t-name" placeholder="Teacher Name">
        <select id="p-cat"></select>
      </div>
      <!-- ADMIN ACTIONS -->
      <div id="admin-actions" class="admin-section" style="display:none;">
        <button class="btn-admin" style="color:var(--accent); border:1px solid var(--accent);" onclick="toggleBranding()">🎨 BRANDING DASHBOARD</button>
        <button class="btn-admin" style="color:var(--neon); border:1px solid var(--neon);" onclick="prepareBulkPrint()">🖨️ BULK QR SYSTEM (A4)</button>
        <button class="btn-admin" style="color:white; border:1px solid rgba(255,255,255,0.15);" onclick="forceSync()">🔄 SYNC FROM SHEET</button>
        <div id="admin-branding" class="admin-branding">
          <div class="upload-box"><label>Logo</label><input type="file" onchange="handleFile(this,'Logo_ID')" accept="image/*"></div>
          <div class="upload-box"><label>Founder</label><input type="file" onchange="handleFile(this,'Founder_ID')" accept="image/*"></div>
          <div class="upload-box"><label>Background</label><input type="file" onchange="handleFile(this,'Background_ID')" accept="image/*"></div>
        </div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">← LOGOUT</button>
  </div>
  <script>
    const API = "https://script.google.com/macros/s/AKfycby7ixG_4AJblYo28xgH3fAWqvwhBEWn6I43rT3SYsRRGJ5UQspTEn5bvfadfd6P8sgJIg/exec";
    let scores = {}, houseColors = {}, currentMode = "Positive", currentDept = "", selectedDept = "", scanActive = false, html5QrCode = null;
    async function boot() {
      const status = document.getElementById('sync-status');
      const cache = localStorage.getItem('goats_cache'); if (cache) try { render(JSON.parse(cache)); } catch(e){}
      status.innerText = "⌛";
      try {
        const ping = await fetch(API, { method:"POST", body: JSON.stringify({action:"ping"}) }).then(r => r.json());
        if(ping.success) { status.innerText = "🟢 LIVE"; status.className = "status-live"; }
        const res = await fetch(API, { method:"POST", body: JSON.stringify({action:"getAppData"}) }).then(r => r.json());
        if(res && res.deptList) { localStorage.setItem('goats_cache', JSON.stringify(res)); render(res); }
      } catch(e) {
        status.innerText = "🔴 OFFLINE"; status.className = "status-offline";
        showToast("⚠️ Cannot reach server");
      }
    }
    function render(data) {
      if (!data) return;
      const { images, houseConfig, deptList, categories } = data;
      if(images && images.bg) document.getElementById('main-bg').style.backgroundImage = `url('${images.bg}')`;
      if(images && images.logo) document.getElementById('m-logo').src = images.logo;
      if(images && images.founder) document.getElementById('m-founder').src = images.founder;
      document.getElementById('dept-grid').innerHTML = deptList.map(d => `
        <div class="dept-card" onclick="openLogin('${d}')">
          <b>${d}</b>
          <div class="dept-card-bar"></div>
        </div>`).join('');
      if(categories) document.getElementById('p-cat').innerHTML = categories.map(c => `<option>${c}</option>`).join('');
      if(houseConfig) {
        const strip = document.getElementById('score-strip'), grid = document.getElementById('house-grid'), sel = document.getElementById('man-house');
        strip.innerHTML = ""; grid.innerHTML = ""; sel.innerHTML = '<option selected disabled>House</option>';
        houseConfig.forEach(h => {
          scores[h.name] = 0; houseColors[h.name] = h.color;
          strip.innerHTML += `<div class="score-chip" id="chip-${h.name}" style="border-top-color:${h.color}; --chip-color:${h.color}"><div class="chip-rank" id="rank-${h.name}"></div><div class="chip-name">${h.name}</div><div class="chip-score" id="s-${h.name}">0</div></div>`;
          grid.innerHTML += `<button class="house-btn" style="background:${h.color}; --glow:${h.color};" onclick="record('${h.name}','WINNER')">${h.name}</button>`;
          sel.add(new Option(h.name, h.name));
        });
        animateAllGlow(houseConfig);
      }
      setMode('Positive');
    }
    function animateAllGlow(houses) {
      houses.forEach((h, i) => {
        const btn = document.querySelectorAll('.house-btn')[i];
        if(btn) btn.style.animation = `pulseGlow ${2 + i*0.3}s ease-in-out infinite`;
      });
    }
    function updateRanks() {
      const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
      const medals = ['🥇','🥈','🥉'];
      sorted.forEach(([ name ], i) => {
        const chip = document.getElementById('chip-'+name);
        const rank = document.getElementById('rank-'+name);
        if(rank) rank.innerText = medals[i] || '';
        if(chip) chip.classList.toggle('leader', i === 0);
      });
    }
    function openLogin(d) {
      selectedDept = d;
      document.getElementById('target-dept').innerText = d;
      document.getElementById('pass-input').value = '';
      document.getElementById('login-modal').style.display = 'flex';
      setTimeout(() => document.getElementById('pass-input').focus(), 300);
    }
    function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }
    async function handleLogin() {
      const p = document.getElementById('pass-input').value; if(!p) return;
      const res = await fetch(API, { method:"POST", body: JSON.stringify({action:"authenticate", user:selectedDept, pass:p}) }).then(r=>r.json());
      if(res.success) {
        closeLogin();
        document.getElementById('dept-gate').style.display = 'none';
        document.getElementById('teacher-view').style.display = 'block';
        currentDept = selectedDept;
        document.getElementById('dept-label').innerText = selectedDept;
        const isAdmin = res.role === 'Admin';
        document.getElementById('admin-actions').style.display = isAdmin ? 'flex' : 'none';
        ['house-grid','cam-area','manual-area','type-select','teacher-meta'].forEach(id => {
          const el = document.getElementById(id); if(el) el.style.display = isAdmin ? 'none' : '';
        });
        if(!isAdmin) {
          document.getElementById('type-select').style.display = 'flex';
          document.getElementById('house-grid').style.display = 'grid';
        }
      } else { alert("❌ Wrong Password"); }
    }
    async function record(hInput, sName, sDept = null) {
      const t = document.getElementById('t-name').value;
      if(!t) { alert("⚠️ Enter Teacher Name first!"); if(scanActive) stopCam(); return; }
      const actualH = Object.keys(scores).find(k => k.toLowerCase() === hInput.trim().toLowerCase());
      if(!actualH) return;
      const pts = currentMode === 'Positive' ? 10 : -5;
      // 1. INSTANT LOCAL UPDATE
      scores[actualH] += pts;
      document.getElementById('s-'+actualH).innerText = scores[actualH];
      updateRanks();
      // 2. VISUAL FEEDBACK — NO WORDS
      if(pts > 0) confetti({ particleCount: 60, spread: 70, origin: { y: 0.6 } });
      else popEmoji('😢');
      // 3. BACKGROUND SYNC + ROLLBACK
      try {
        const res = await fetch(API, { method:"POST", body: JSON.stringify({ action:"submitPoint", data:{ dept:currentDept, studentDept:sDept, studentName:sName, teacherName:t, category:document.getElementById('p-cat').value, house:actualH, type:currentMode } }) }).then(r=>r.json());
        if(!res || !res.success) throw new Error(res.error || "Server Reject");
      } catch(e) {
        scores[actualH] -= pts;
        document.getElementById('s-'+actualH).innerText = scores[actualH];
        updateRanks();
        alert("❌ SYNC FAILED: Data for " + sName + " was NOT saved. Please re-scan.");
      }
    }
    function popEmoji(emoji) {
      const el = document.createElement('div'); el.className = 'emoji-pop'; el.innerText = emoji;
      document.body.appendChild(el); setTimeout(() => el.remove(), 900);
    }
    async function toggleCam() {
      const btn = document.getElementById('cam-btn'), hint = document.getElementById('scan-hint');
      if(!scanActive) {
        document.getElementById('reader').style.display = 'block';
        btn.classList.add('scanning'); btn.innerText = '⏹'; hint.innerText = 'SCANNING...';
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start({ facingMode:"environment" }, { fps:15, qrbox:240 }, (t) => {
          const p = t.split('|').map(x => x.trim());
          if(p.length >= 3) { record(p[2], p[0], p[1]); stopCam(); }
        }); scanActive = true;
      } else stopCam();
    }
    async function stopCam() {
      if(html5QrCode) await html5QrCode.stop();
      document.getElementById('reader').style.display = 'none';
      const btn = document.getElementById('cam-btn'), hint = document.getElementById('scan-hint');
      btn.classList.remove('scanning'); btn.innerText = '📷'; hint.innerText = 'TAP TO SCAN QR';
      scanActive = false;
    }
    function submitManual() {
      const n = document.getElementById('man-name').value, h = document.getElementById('man-house').value;
      if(!n || !h) { showToast("Fill student name & house"); return; }
      record(h, n); document.getElementById('man-name').value = "";
    }
    function setMode(m) {
      currentMode = m;
      document.getElementById('btn-pos').className = 'mode-btn' + (m==='Positive' ? ' active-pos' : '');
      document.getElementById('btn-neg').className = 'mode-btn' + (m==='Negative' ? ' active-neg' : '');
    }
    function logout() {
      document.getElementById('teacher-view').style.display = 'none';
      document.getElementById('dept-gate').style.display = 'block';
      currentDept = ""; if(scanActive) stopCam();
    }
    function toggleBranding() { const b = document.getElementById('admin-branding'); b.style.display = b.style.display==='block'?'none':'block'; }
    async function forceSync() { showToast("🔄 Syncing..."); localStorage.removeItem('goats_cache'); await boot(); showToast("✅ Sync Complete"); }
    async function prepareBulkPrint() {
      showToast("Loading students...");
      const res = await fetch(API, { method:"POST", body: JSON.stringify({action:"getStudentList"}) }).then(r=>r.json());
      const pw = window.open('', '_blank');
      pw.document.write(`<!DOCTYPE html><html><head><title>Batch QR Cards</title>
        <style>
          body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
          .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
          .box { border: 1px solid #ddd; padding: 10px; text-align: center; page-break-inside: avoid; border-radius: 8px; }
          .qr { width: 110px; height: 110px; margin: 5px auto; background: #fff; }
          .lbl { font-size: 9px; font-weight: 900; text-transform: uppercase; line-height: 1.4; margin-top: 5px; color: #000; }
          .btn { position: fixed; top: 10px; right: 10px; padding: 12px 24px; background: #000; color: #fbff00; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; z-index: 999; }
          @media print { .btn { display: none; } @page { size: A4; margin: 1cm; } }
        </style>
      </head><body>
        <button class="btn" onclick="window.print()">PRINT A4 SHEET</button>
        <div class="grid" id="grid"></div>
        <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
        <script>
          function generate() {
            const ss = ${JSON.stringify(res.students)};
            const g = document.getElementById('grid');
            if (typeof QRCode === 'undefined') { setTimeout(generate, 100); return; }
            ss.forEach(s => {
              const b = document.createElement('div'); b.className = 'box';
              const q = document.createElement('div'); q.className = 'qr';
              const l = document.createElement('div'); l.className = 'lbl';
              l.innerHTML = (s.name||'STUDENT') + '<br>' + (s.dept||'') + ' | ' + (s.house||'');
              b.appendChild(q); b.appendChild(l); g.appendChild(b);
              try { new QRCode(q, { text:(s.name||'')+' | '+(s.dept||'')+' | '+(s.house||''), width:110, height:110 }); } catch(e){}
            });
          }
          generate();
        <\/script>
      </body></html>`);
      pw.document.close();
    }
    function handleFile(input, key) {
      if(!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        showToast("Uploading...");
        const res = await fetch(API, { method:"POST", body: JSON.stringify({ action:"uploadBranding", data:{ key, name:input.files[0].name, file:e.target.result } }) }).then(r=>r.json());
        if(res.success) { localStorage.removeItem('goats_cache'); showToast("✅ Updated!"); setTimeout(()=>location.reload(), 1000); }
        else showToast("❌ Upload Failed");
      };
      reader.readAsDataURL(input.files[0]);
    }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
  </script>
</body>
</html>
